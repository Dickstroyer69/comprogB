<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprog B-INI</title>
    <link rel="Stylesheet" href="Design.css">
</head>
<body>
    <div class="page-wrapper">
        <nav>
            <ul class="navlisst">
                <li><a href="index.html">Home</a></li>
                <li><a href="Memories.html">Experiences</a></li>
                <li><a href="About.html">About</a></li>
            </ul>
        </nav>

        <h1 class="Class">Comprog B-INI</h1>
        <p class="Class">Thank you for the Memories!</p> 

        <button class="enter-btn" id="enterBtn" data-target="Memories.html">Enter</button>
    </div>
    <div class="page-transition-overlay" aria-hidden="true"></div>
    <button class="music-toggle" id="musicToggle" type="button">Play Music</button>

    <script>
        function initPageTransitions() {
            const exitDuration = 30;
            const musicToggle = document.getElementById('musicToggle');
            let musicAudio = null;
            function normalizeUrl(url) {
                return new URL(url, window.location.href).href.split('#')[0].split('?')[0].replace(/\/+$/, '').toLowerCase();
            }

            function saveMusicState() {
                if (!musicAudio) return;
                sessionStorage.setItem('musicTime', String(musicAudio.currentTime || 0));
            }

            function startMusic() {
                if (!musicAudio) {
                    musicAudio = new Audio('taralets/saranggola/ben-ben-saranggola-official-lyric-video-128-ytshorts.savetube.me.mp3');
                    musicAudio.loop = true;
                    musicAudio.preload = 'auto';
                    musicAudio.volume = 0.35;
                    musicAudio.addEventListener('timeupdate', saveMusicState);
                    musicAudio.addEventListener('pause', saveMusicState);
                }
                const savedTime = Number(sessionStorage.getItem('musicTime') || 0);
                if (savedTime > 0) {
                    musicAudio.currentTime = savedTime;
                }
                musicAudio.play().catch(() => {});
                localStorage.setItem('musicEnabled', '1');
                if (musicToggle) {
                    musicToggle.textContent = 'Music On';
                    musicToggle.classList.add('active');
                }
            }

            function stopMusic() {
                if (musicAudio) {
                    musicAudio.pause();
                }
                localStorage.removeItem('musicEnabled');
                saveMusicState();
                if (musicToggle) {
                    musicToggle.textContent = 'Play Music';
                    musicToggle.classList.remove('active');
                }
            }

            if (localStorage.getItem('musicEnabled') === '1' && musicToggle) {
                musicToggle.textContent = 'Music On';
                musicToggle.classList.add('active');
            }

            if (localStorage.getItem('musicEnabled') === '1') {
                startMusic();
            }

            if (musicToggle) {
                musicToggle.addEventListener('click', function () {
                    if (musicAudio && !musicAudio.paused) {
                        stopMusic();
                    } else {
                        startMusic();
                    }
                });
            }

            function goToPage(url) {
                if (!url) return;
                document.body.classList.add('is-navigating');
                setTimeout(() => {
                    window.location.href = url;
                }, exitDuration);
            }

            document.querySelectorAll('a[href$=".html"]').forEach(link => {
                link.addEventListener('click', function (event) {
                    const url = link.getAttribute('href');
                    if (!url) return;
                    if (normalizeUrl(url) === normalizeUrl(window.location.href)) return;
                    event.preventDefault();
                    saveMusicState();
                    goToPage(url);
                });
            });

            window.addEventListener('pagehide', saveMusicState);
            window.addEventListener('beforeunload', saveMusicState);

            document.querySelectorAll('button[data-target]').forEach(button => {
                button.addEventListener('click', function (event) {
                    saveMusicState();
                    event.preventDefault();
                    goToPage(button.dataset.target);
                });
            });
        }

        initPageTransitions();
    </script>
</body>
</html>
